<ion-header>
  <ion-toolbar>
    <ion-title>
      Expense Tracker
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      placeholder="Expense Name"
      [(ngModel)]="title">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      type="number"
      placeholder="Amount"
      [(ngModel)]="amount">
    </ion-input>
  </ion-item>

  <ion-button
    expand="block"
    (click)="addExpense()">

    Add Expense
  </ion-button>

  <ion-card>
    <ion-card-header>
      Total Spent
    </ion-card-header>

    <ion-card-content>
      ₹ {{ total }}
    </ion-card-content>
  </ion-card>

  <ion-list>

    <ion-item
      *ngFor="let expense of expenses">

      <ion-label>
        <h2>{{ expense.title }}</h2>
        <p>₹ {{ expense.amount }}</p>
      </ion-label>

      <ion-button
        color="danger"
        fill="clear"
        (click)="deleteExpense(expense.id)">

        Delete
      </ion-button>

    </ion-item>

  </ion-list>

</ion-content>
